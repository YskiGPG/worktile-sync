# Worktile 网盘同步配置

worktile:
  # Worktile 团队主域名
  base_url: "https://zrhubei.worktile.com"

  # 文件存储服务域名（上传用）
  box_url: "https://wt-box.worktile.com"

  # Team ID（从 Cookie 键名 s-{team_id} 中获取）
  team_id: "695364022dd1c542de797196"

  # 认证信息 — 从浏览器 DevTools 中复制完整 Cookie 字符串
  auth:
    cookie: "s-695364022dd1c542de797196=YOUR_SESSION_TOKEN_HERE"

  # 要同步的根文件夹 ID（留空则同步整个团队网盘）
  root_folder_id: ""

# 腾讯云 COS 配置（用于文件下载签名）
cos:
  secret_id: "AKIDjKD0b1EDyZx78B8yfIfsu1yhDXkncDds"
  # SecretKey — 需要从 Worktile 前端 JS 中提取
  # 运行 python tools/probe_download.py 可自动尝试提取
  secret_key: ""
  bucket_host: "app-wt-original-release-1348738073.cos.ap-shanghai.myqcloud.com"

sync:
  # 本地同步目录
  local_dir: "/data/worktile-sync"

  # 同步间隔（秒）
  interval: 60

  # 是否启用删除同步（远程删除 → 本地也删除）
  sync_delete: false

  # 是否启用 dry-run 模式（只打印不执行）
  dry_run: false

  # 忽略的文件/文件夹模式
  ignore_patterns:
    - ".DS_Store"
    - "Thumbs.db"
    - "*.tmp"

logging:
  level: "INFO"  # DEBUG / INFO / WARNING / ERROR
  file: "sync.log"
