# Worktile 网盘同步配置

worktile:
  base_url: "https://zrhubei.worktile.com"
  box_url: "https://wt-box.worktile.com"
  team_id: "YOUR_TEAM_ID"
  auth:
    cookie: "s-YOUR_TEAM_ID=YOUR_SESSION_TOKEN"
  root_folder_id: ""  # 留空=同步全部

sync:
  local_dir: "/data/worktile-sync"
  interval: 60

  # 并发下载线程数（首次同步建议 3-5）
  max_workers: 3

  # API 速率限制（每秒最大请求数，避免被封）
  rate_limit: 5.0

  # 本地文件监听（检测到变化立即同步，需要 watchdog 库）
  watch_local: false

  sync_delete: false
  dry_run: false

  ignore_patterns:
    - ".DS_Store"
    - "Thumbs.db"
    - "*.tmp"

notification:
  enabled: false
  error_threshold: 3
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    to: ""
  webhook:
    enabled: false
    url: ""  # Server酱/PushPlus/企业微信 webhook

logging:
  level: "INFO"
  file: "sync.log"
  max_size_mb: 10
  backup_count: 3
